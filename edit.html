<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="DOST_Logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOST-3 · Staff Edit Page</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2d4f;--navy-dark:#0f1e36;--navy-mid:#243a62;
  --gold:#f5a623;--gold-light:#ffc158;--teal:#1b7a6e;
  --blue-light:#e8f0fa;--blue-mid:#c8d8f0;
  --border:#ccd6e8;--input-bg:#fafbff;
  --gray-50:#f9fafb;--gray-200:#e5e7eb;--gray-300:#d1d5db;
  --gray-400:#9ca3af;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;
  --red:#dc2626;--green:#16a34a;--orange:#ea580c;
  --app:#2d5a1b;--mpp:#1a3f6b;--emp:#1a5c4a;--fs:#1b7a6e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:#dde4ef;color:var(--gray-800);min-height:100vh;font-size:14px;line-height:1.5;}
.topbar{background:var(--navy-dark);color:white;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:46px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:13px;font-weight:600;letter-spacing:.03em;opacity:.9;}
.staff-badge{background:var(--orange);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}
.topbar-actions{display:flex;gap:8px;}
.tbtn{border:none;padding:6px 14px;font-weight:700;font-size:12.5px;cursor:pointer;border-radius:4px;font-family:inherit;transition:all .15s;}
.tbtn-print{background:rgba(255,255,255,.15);color:white;}
.tbtn-print:hover{background:rgba(255,255,255,.25);}
.tbtn-save{background:var(--gold);color:var(--navy-dark);}
.tbtn-save:hover{background:var(--gold-light);}
.tbtn-approve{background:var(--green);color:white;}
.tbtn-approve:hover{background:#15803d;}
.paper-wrap{max-width:940px;margin:28px auto;padding:0 12px 60px;}
.paper{background:white;box-shadow:0 2px 20px rgba(0,0,0,.12);border-radius:2px;overflow:hidden;}
/* BANNER */
.banner{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-mid) 100%);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.banner-left h1{color:white;font-size:16px;font-weight:700;}
.banner-left p{color:#8fa5c8;font-size:12.5px;margin-top:3px;}
.status-row{display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.status-chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.s-pending{background:#fef3c7;color:#92400e;}
.s-reviewed{background:#d1fae5;color:#065f46;}
.s-approved{background:#dbeafe;color:#1e40af;}
.s-declined{background:#fee2e2;color:#991b1b;}
.ref-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:8px 16px;text-align:right;}
.ref-chip-lbl{color:#8fa5c8;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.ref-chip-val{color:white;font-size:15px;font-weight:700;font-family:monospace;letter-spacing:.08em;margin-top:2px;}
.prog-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.prog-tag{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.05em;}
.tag-app{background:var(--app);color:white;}
.tag-mpp{background:var(--mpp);color:white;}
.tag-emp{background:var(--emp);color:white;}
.tag-fs{background:var(--fs);color:white;}
/* STAFF PANEL */
.staff-panel{background:#fff8f0;border:1.5px solid #fec89a;border-radius:6px;padding:16px;margin:20px 28px 0;}
.staff-panel-title{font-size:12px;font-weight:700;color:var(--orange);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.status-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.sbtn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid transparent;cursor:pointer;transition:all .15s;font-family:inherit;}
.sbtn-pending{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.sbtn-pending.active,.sbtn-pending:hover{background:#fcd34d;}
.sbtn-reviewed{background:#d1fae5;color:#065f46;border-color:#6ee7b7;}
.sbtn-reviewed.active,.sbtn-reviewed:hover{background:#6ee7b7;}
.sbtn-approved{background:#dbeafe;color:#1e40af;border-color:#93c5fd;}
.sbtn-approved.active,.sbtn-approved:hover{background:#93c5fd;}
.sbtn-declined{background:#fee2e2;color:#991b1b;border-color:#fca5a5;}
.sbtn-declined.active,.sbtn-declined:hover{background:#fca5a5;}
/* SECTIONS */
.fbody{padding:0 28px 28px;}
.section{margin-top:24px;}
.sec-head{color:white;padding:8px 16px;font-weight:700;font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px;border-radius:3px 3px 0 0;}
.sec-head.app{background:var(--app);}
.sec-head.mpp{background:var(--mpp);}
.sec-head.emp{background:var(--emp);}
.sec-head.fs{background:var(--fs);}
.sec-num{background:rgba(255,255,255,.2);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.prog-only-badge{background:rgba(255,255,255,.18);color:#d0e4ff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;margin-left:auto;letter-spacing:.03em;}
.sec-body{border:1px solid var(--border);border-top:none;padding:18px;border-radius:0 0 3px 3px;}
.stitle{font-weight:700;color:var(--navy);font-size:12px;margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--blue-mid);text-transform:uppercase;letter-spacing:.04em;}
.stitle:first-child{margin-top:0;}
.group-lbl{font-weight:700;color:var(--navy);font-size:12px;margin:12px 0 5px;padding:4px 10px;background:var(--blue-light);border-left:3px solid var(--navy);border-radius:0 3px 3px 0;}
/* FIELDS */
.fg{display:grid;gap:12px;margin-bottom:10px;}
.fg.c1{grid-template-columns:1fr;}
.fg.c2{grid-template-columns:1fr 1fr;}
.fg.c3{grid-template-columns:1fr 1fr 1fr;}
.fg.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fg.c21{grid-template-columns:2fr 1fr;}
.f{display:flex;flex-direction:column;gap:3px;}
.f label{font-size:11.5px;font-weight:600;color:var(--gray-700);}
.f input[type=text],.f input[type=email],.f input[type=tel],
.f input[type=number],.f input[type=date],.f select,.f textarea{
  border:1px solid var(--border);border-radius:3px;padding:6px 9px;
  font-size:13px;color:var(--gray-800);background:var(--input-bg);
  font-family:inherit;width:100%;transition:border-color .15s;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--navy-mid);box-shadow:0 0 0 2px rgba(36,58,98,.12);background:white;}
.f textarea{resize:vertical;min-height:60px;}
.hint{font-size:11px;color:var(--gray-400);font-style:italic;margin-top:2px;}
/* CHECKBOXES / RADIOS */
.cg{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:4px;}
.ci{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--gray-700);}
.ci input{cursor:pointer;width:14px;height:14px;}
/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:8px 0;}
.tbl th{background:var(--navy);color:white;padding:7px 10px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.03em;}
.tbl td{padding:5px 8px;border:1px solid var(--border);vertical-align:middle;}
.tbl td input[type=text],.tbl td input[type=number],.tbl td input[type=date],.tbl td select{width:100%;border:none;background:transparent;font-size:12.5px;padding:2px 4px;font-family:inherit;color:var(--gray-800);}
.tbl td input:focus,.tbl td select:focus{outline:1px solid var(--navy-mid);}
.tbl tr:nth-child(even) td{background:var(--gray-50);}
.add-row{font-size:11.5px;color:var(--navy);background:none;border:1px dashed var(--navy-mid);border-radius:3px;padding:4px 12px;cursor:pointer;margin-top:6px;font-weight:600;transition:all .15s;}
.add-row:hover{background:var(--blue-light);}
/* CONCERN TABLES */
.ctbl{width:100%;border-collapse:collapse;font-size:12px;margin:4px 0;}
.ctbl th{background:var(--navy-mid);color:white;padding:6px 10px;font-size:11px;font-weight:700;text-align:left;}
.ctbl td{padding:6px 10px;border:1px solid var(--border);vertical-align:middle;}
.ctbl tr:nth-child(even) td{background:var(--gray-50);}
.ctbl td.area{font-weight:600;color:var(--gray-700);font-size:12.5px;width:36%;}
.sub-cg{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:3px;}
.sub-ci{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--gray-600);cursor:pointer;}
.sub-ci input{width:13px;height:13px;cursor:pointer;}
/* QUAL BOX */
.qual-box{background:#fffbe6;border:1px solid #f5d070;border-radius:4px;padding:12px 16px;margin:10px 0;font-size:12.5px;}
.qi{display:flex;align-items:flex-start;gap:8px;margin:7px 0;}
.qi input{margin-top:2px;cursor:pointer;}
/* FS */
.fs-lvl{background:var(--teal);color:white;padding:5px 12px;font-size:11.5px;font-weight:700;letter-spacing:.05em;border-radius:3px;margin:12px 0 6px;}
.ftbl{width:100%;border-collapse:collapse;font-size:12px;}
.ftbl th{background:var(--teal);color:white;padding:6px 10px;text-align:left;font-size:11px;font-weight:700;}
.ftbl td{border:1px solid var(--border);padding:5px 8px;vertical-align:middle;}
.ftbl tr:nth-child(even) td{background:var(--gray-50);}
.ftbl td input,.ftbl td select{width:100%;border:none;background:transparent;font-size:12px;font-family:inherit;padding:2px 4px;}
.ftbl td input:focus,.ftbl td select:focus{outline:1px solid var(--teal);}
/* SHARED INFO */
.shared-info{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:4px;padding:8px 14px;font-size:12px;color:var(--gray-700);margin:8px 0;}
/* ACTIONS */
.form-actions{display:flex;gap:12px;justify-content:flex-end;padding:18px 28px 26px;border-top:1px solid var(--gray-200);background:var(--gray-50);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 22px;border-radius:4px;font-weight:700;font-size:13px;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-outline{background:white;color:var(--navy);border:1.5px solid var(--navy);}
.btn-outline:hover{background:var(--blue-light);}
.btn-orange{background:var(--orange);color:white;}
.btn-orange:hover{background:#c2410c;}
.btn-green{background:var(--green);color:white;}
.btn-green:hover{background:#15803d;}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;color:white;padding:12px 20px;border-radius:6px;font-size:13px;font-weight:600;z-index:500;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.show{display:block;animation:slideup .3s ease;}
.toast.success{background:#16a34a;}
.toast.error{background:#dc2626;}
@keyframes slideup{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@media(max-width:640px){
  .fg.c2,.fg.c3,.fg.c4,.fg.c21{grid-template-columns:1fr;}
  .paper-wrap{padding:0 6px 40px;}
  .fbody{padding:14px 16px;}
  .staff-panel{margin:16px 12px 0;}
}
@media print{
  .topbar,.form-actions,.staff-panel{display:none!important;}
  body{background:white;}
  .paper-wrap{margin:0;padding:0;max-width:100%;}
  .paper{box-shadow:none;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="DOST_Logo.png" style="height:32px;width:auto;">
    <span class="topbar-title">DOST-3 · Staff Edit Page</span>
    <span class="staff-badge">Authorized Personnel Only</span>
  </div>
  <div class="topbar-actions">
    <button class="tbtn tbtn-print" onclick="window.print()">Print</button>
    <button class="tbtn tbtn-save" onclick="saveChanges()">Save Changes</button>
    <button class="tbtn tbtn-approve" onclick="markApproved()">Mark as Approved</button>
  </div>
</div>

<div class="paper-wrap"><div class="paper">

<!-- BANNER -->
<div class="banner">
  <div class="banner-left">
    <img src="DOST_Logo.png" style="height:50px;width:auto;margin-bottom:8px;">
    <h1>Submission Review &amp; Edit</h1>
    <p>DOST-3 · 2025 Assessment and Qualifying Form — Staff View</p>
    <div class="status-row">
      <span class="status-chip s-pending" id="status-chip">● PENDING REVIEW</span>
      <span style="color:#8fa5c8;font-size:12px" id="date-display"></span>
    </div>
    <div class="prog-tags" id="prog-tags"></div>
  </div>
  <div class="ref-chip">
    <div class="ref-chip-lbl">Reference No.</div>
    <div class="ref-chip-val" id="ref-display">—</div>
  </div>
</div>

<!-- STAFF ASSESSMENT PANEL -->
<div class="staff-panel">
  <div class="staff-panel-title">⚙ Staff Assessment Notes</div>
  <div class="fg c1">
    <div class="f">
      <label>Assessment Status</label>
      <div class="status-btns">
        <button class="sbtn sbtn-pending active" id="sbtn-pending" onclick="setStatus('pending')">Pending</button>
        <button class="sbtn sbtn-reviewed" id="sbtn-reviewed" onclick="setStatus('reviewed')">Reviewed</button>
        <button class="sbtn sbtn-approved" id="sbtn-approved" onclick="setStatus('approved')">Approved</button>
        <button class="sbtn sbtn-declined" id="sbtn-declined" onclick="setStatus('declined')">Declined</button>
      </div>
    </div>
  </div>
  <div class="fg c2" style="margin-top:10px">
    <div class="f"><label>Assigned PSTO Staff</label><input type="text" id="staff-assigned" placeholder="Name of assigned staff"></div>
    <div class="f"><label>Date of Assessment</label><input type="date" id="staff-date"></div>
  </div>
  <div class="fg c1">
    <div class="f"><label>Internal Remarks / Observations</label><textarea id="staff-remarks" rows="3" placeholder="Internal notes for DOST staff only — not visible to applicant..."></textarea></div>
  </div>
  <div class="fg c1">
    <div class="f"><label>Reason for Decline (if applicable)</label><input type="text" id="staff-decline" placeholder="Reason for declining this application"></div>
  </div>
  <div class="fg c2">
    <div class="f"><label>Assisted by (DOST-III PSTO Staff)</label><input type="text" id="sig-assisted" placeholder="Name"></div>
    <div class="f"><label>Noted by (Provincial S&amp;T Director)</label><input type="text" id="sig-noted" placeholder="Name"></div>
  </div>
</div>

<!-- FORM BODY — injected by JS -->
<div class="fbody" id="form-body"></div>

<div class="form-actions">
  <button class="btn btn-outline" onclick="window.print()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Print
  </button>
  <button class="btn btn-orange" onclick="saveChanges()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save Changes
  </button>
  <button class="btn btn-green" onclick="markApproved()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    Mark as Approved
  </button>
</div>

</div></div>
<div class="toast" id="toast"></div>

<script>
// ─── READ URL PARAMS ────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8qsi0dgrBP-7PcH-iK-38dePjWp5QA2_LPRA99sbFZZ_dpCQR0asxIsOknFySFn2-/exec';
const p = new URLSearchParams(window.location.search);
const ref = p.get('ref') || '—';

// All form data will be stored here after fetching from Sheets
let formData = {};
let programs = '';

function gp(k){ return formData[k] || ''; }

// Fetch full submission data from Google Sheets, then build the form
fetch(APPS_SCRIPT_URL + '?ref=' + ref)
  .then(r => r.json())
  .then(res => {
    if(res.success && res.data){
      const d = res.data;

      // Map sheet column names to the keys edit.html expects
      formData = {
        referenceNumber:      d['Reference Number']          || '',
        programs:             d['Programs Applied']          || '',
        submissionDate:       d['Submission Date']           || '',
        // Shared owner
        ownerName:            d['Owner Name']                || '',
        contactPerson:        d['Contact Person']            || '',
        ownerSex:             d['Owner Sex']                 || '',
        ownerAge:             d['Owner Age']                 || '',
        ownerPosition:        d['Owner Position']            || '',
        ownerPwd:             d['PWD']                       || '',
        ownerSenior:          d['Senior Citizen']            || '',
        ownerEmail:           d['Email Address']             || '',
        ownerMobile:          d['Mobile Number']            || '',
        consultAns:           d['Previously Consulted']      || '',
        consultNoReason:      d['No Consult Reason']         || '',
        appConsultRows:       d['APP Consult Rows']          || '',
        // APP
        appFarmName:          d['Firm / Farm Name']          || '',
        appFarmAddress:       d['Complete Address']          || '',
        appProvince:          d['Province']                  || '',
        appArea:              d['APP Area']                  || '',
        appYearEst:           d['Year Established']          || '',
        appWorkers:           d['APP Workers']               || '',
        appBackground:        d['Firm Background']           || '',
        appFarmRows:          d['APP Farm Rows']             || '',
        appPreAssessRows:     d['APP Pre-Assessment Rows']   || '',
        // MPP
        firmName:             d['Firm / Farm Name']          || '',
        firmProvince:         d['Province']                  || '',
        firmAddress:          d['Complete Address']          || '',
        firmOwnerName:        d['Owner Name']                || '',
        firmContactPerson:    d['Contact Person']            || '',
        firmOwnerSex:         d['Owner Sex']                 || '',
        firmOwnerAge:         d['Owner Age']                 || '',
        firmOwnerPosition:    d['Owner Position']            || '',
        firmOwnerPwd:         d['PWD']                       || '',
        firmOwnerSenior:      d['Senior Citizen']            || '',
        firmMobileNum:        d['Mobile Number']             || '',
        firmEmail:            d['Email Address']             || '',
        mppBackground:        d['Firm Background']           || '',
        mppConsultAns:        d['Previously Consulted']      || '',
        mppConsultNoReason:   d['No Consult Reason']         || '',
        mppConsultRows:       d['MPP Consult Rows']          || '',
        mppPaYear:            d['Year Established']          || '',
        mppPaCapital:         d['Initial Capital']           || '',
        mppPaRegnum:          d['Company Reg No']            || '',
        mppPaRegyear:         d['Year Registered']           || '',
        mppOrg:               d['Organization Type']         || '',
        mppCap:               d['Capital Classification']    || '',
        mppEmp:               d['Employment Classification'] || '',
        mppEmpProd:           d['Direct Workers - Production']     || '',
        mppEmpNonprod:        d['Direct Workers - Non-Production'] || '',
        mppEmpIndirect:       d['Indirect Workers']          || '',
        mppEmpTotal:          d['Total Workers']             || '',
        mppProdVol:           d['Annual Production Volume']  || '',
        mppProdVal:           d['Estimated Value PHP']       || '',
        mppMktLocal:          d['Market - Local']            || '',
        mppMktForeign:        d['Market - Foreign']          || '',
        mppMktTarget:         d['Target Additional Market']  || '',
        mppBizOthers:         d['Business Activity Others']  || '',
        mppProducts:          d['MPP Products/Services']     || '',
        mppOrgchart:          d['MPP Org Chart Available']   || '',
        mppConcerns:          d['MPP Strategies and Problems']|| '',
        // EMP
        empFirmName:          d['Firm / Farm Name']          || '',
        empFirmProvince:      d['Province']                  || '',
        empFirmAddress:       d['Complete Address']          || '',
        empOwnerName:         d['Owner Name']                || '',
        empContactPerson:     d['Contact Person']            || '',
        empOwnerSex:          d['Owner Sex']                 || '',
        empOwnerAge:          d['Owner Age']                 || '',
        empOwnerPosition:     d['Owner Position']            || '',
        empOwnerPwd:          d['PWD']                       || '',
        empOwnerSenior:       d['Senior Citizen']            || '',
        empMobileNum:         d['Mobile Number']             || '',
        empEmail:             d['Email Address']             || '',
        empBackground:        d['Firm Background']           || '',
        empConsultAns:        d['Previously Consulted']      || '',
        empConsultNoReason:   d['No Consult Reason']         || '',
        empConsultRows:       d['EMP Consult Rows']          || '',
        empPaYear:            d['Year Established']          || '',
        empPaCapital:         d['Initial Capital']           || '',
        empPaRegnum:          d['Company Reg No']            || '',
        empPaRegyear:         d['Year Registered']           || '',
        empOrg:               d['Organization Type']         || '',
        empCap:               d['Capital Classification']    || '',
        empEmpcl:             d['Employment Classification'] || '',
        empEmpProd:           d['Direct Workers - Production']     || '',
        empEmpNonprod:        d['Direct Workers - Non-Production'] || '',
        empEmpIndirect:       d['Indirect Workers']          || '',
        empEmpTotal:          d['Total Workers']             || '',
        empProdVol:           d['Annual Production Volume']  || '',
        empProdVal:           d['Estimated Value PHP']       || '',
        empProducts:          d['MPP Products/Services']     || '',
        empElecRows:          d['EMP Electricity Consumption']|| '',
        empElecTotalKwh:      d['EMP Elec Total kWh']        || '',
        empElecTotalPhp:      d['EMP Elec Total PHP']        || '',
        empLpgRows:           d['EMP Fuel Consumption']      || '',
        empLpgTotalKg:        d['EMP LPG Total kg']          || '',

let currentStatus='pending';
function setStatus(s){
  currentStatus=s;
  ['pending','reviewed','approved','declined'].forEach(x=>document.getElementById('sbtn-'+x).classList.toggle('active',x===s));
  const chip=document.getElementById('status-chip');
  const labels={pending:'● PENDING REVIEW',reviewed:'● REVIEWED',approved:'● APPROVED',declined:'● DECLINED'};
  const cls={pending:'s-pending',reviewed:'s-reviewed',approved:'s-approved',declined:'s-declined'};
  chip.textContent=labels[s]; chip.className='status-chip '+cls[s];
}

// ─── HELPERS ────────────────────────────────────────────────────────────────────
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toRoman(n){return['I','II','III','IV','V','VI','VII','VIII','IX','X'][n-1]||n;}
function parseRows(str){ if(!str || typeof str !== 'string')return[]; return str.split(';;').map(r=>r.split('||')); }

// Field builders
function inp(id,val,type='text'){
  return `<input type="${type}" id="${esc(id)}" value="${esc(val)}" placeholder="">`;
}
function fieldEl(label,id,val,type='text'){
  return `<div class="f"><label>${esc(label)}</label><input type="${type}" id="${esc(id)}" value="${esc(val)}"></div>`;
}
function selectEl(label,id,val,opts){
  let o=`<option value="">Select</option>`; opts.forEach(v=>{ o+=`<option value="${esc(v)}"${val===v?' selected':''}>${esc(v)}</option>`; });
  return `<div class="f"><label>${esc(label)}</label><select id="${esc(id)}">${o}</select></div>`;
}
function textareaEl(label,id,val,rows=2){
  return `<div class="f"><label>${esc(label)}</label><textarea id="${esc(id)}" rows="${rows}">${esc(val)}</textarea></div>`;
}
function fg(cols,html){ return `<div class="fg ${cols}">${html}</div>`; }

// Radio group — pre-selects the matching option
function radioGroup(name,selected,options){
  return '<div class="cg">'+options.map(o=>{
    const v=typeof o==='object'?o.value:o; const l=typeof o==='object'?o.label:o;
    return `<label class="ci"><input type="radio" name="${esc(name)}" value="${esc(v)}"${selected===v?' checked':''}> ${esc(l)}</label>`;
  }).join('')+'</div>';
}
// Checkbox — pre-checked if value found in storedStr
function chk(name,label,storedStr){
  const checked = storedStr && storedStr.includes(label);
  return `<label class="ci"><input type="checkbox" name="${esc(name)}"${checked?' checked':''}> ${esc(label)}</label>`;
}
function secHead(cls,num,title,badge){
  return `<div class="sec-head ${cls}"><span class="sec-num">${toRoman(num)}</span> ${title} <span class="prog-only-badge">${badge}</span></div>`;
}

// Build editable table from stored rows (serialized as "a||b||c;;d||e||f")
function buildTable(headers,rows,minRows,tbodyId){
  let h=`<table class="tbl"><thead><tr>${headers.map(hh=>`<th>${esc(hh)}</th>`).join('')}</tr></thead><tbody id="${esc(tbodyId)}">`;
  const all=[...rows]; while(all.length<minRows) all.push([]);
  all.forEach(row=>{
    h+=`<tr>`; headers.forEach((_,i)=>{ h+=`<td><input type="text" value="${esc(row[i]||'')}"></td>`; }); h+=`</tr>`;
  });
  return h+`</tbody></table><button class="add-row" onclick="addRow('${esc(tbodyId)}',${headers.length})">+ Add Row</button>`;
}

// Build 12-row monthly table (month col is readonly, 2 data cols)
function buildMonthTable(rows,col1,col2,id1,id2){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let h=`<table class="tbl"><thead><tr><th style="width:18%;text-align:center">Month</th><th style="text-align:center">${esc(col1)}</th><th style="text-align:center">${esc(col2)}</th></tr></thead><tbody>`;
  months.forEach((m,i)=>{
    const row=rows[i]||[]; // row[0]=col1 val, row[1]=col2 val
    h+=`<tr><td style="text-align:center;font-weight:600">${m}</td><td><input type="number" min="0" value="${esc(row[0]||'')}"></td><td><input type="number" min="0" value="${esc(row[1]||'')}"></td></tr>`;
  });
  h+=`<tr style="background:var(--blue-light)"><td style="text-align:center;font-weight:700">TOTAL</td><td><input type="number" min="0" id="${id1}" value="${esc(gp(id1.replace('e-','').replace(/-/g,'_').replace('_','').replace(/-([a-z])/g,(_,c)=>c.toUpperCase())) )}" style="font-weight:700;"></td><td><input type="number" min="0" id="${id2}" value="${esc(gp(id2.replace('e-','').replace(/-/g,'_').replace('_','').replace(/-([a-z])/g,(_,c)=>c.toUpperCase())))}" style="font-weight:700;"></td></tr>`;
  return h+`</tbody></table>`;
}

function addRow(tbodyId,cols){
  const tb=document.getElementById(tbodyId); if(!tb)return;
  const tr=document.createElement('tr');
  let h=''; for(let i=0;i<cols;i++) h+=`<td><input type="text"></td>`;
  tr.innerHTML=h; tb.appendChild(tr);
}

// ─── HELPERS TO READ CURRENT VALUES ────────────────────────────────────────────
function gv(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function gr(name){const e=document.querySelector('input[name="'+name+'"]:checked');if(!e)return'';return(e.value&&e.value!=='on')?e.value:e.parentElement.textContent.trim();}
function gc(id){const e=document.getElementById(id);return e&&e.checked?'Yes':'';}

function getTableData(tbodyId){
  const tb=document.getElementById(tbodyId); if(!tb)return'';
  const rows=[]; tb.querySelectorAll('tr').forEach(tr=>{
    const inputs=tr.querySelectorAll('input,select'); const row=[]; let has=false;
    inputs.forEach(i=>{if((i.value||'').trim())has=true; row.push(i.value||'');});
    if(has) rows.push(row.join('||'));
  });
  return rows.join(';;');
}

function markApproved(){
  setStatus('approved');
  document.getElementById('staff-date').value = new Date().toISOString().split('T')[0];
  saveChanges();
  showToast('✓ Submission marked as Approved','success');
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3500);
}
