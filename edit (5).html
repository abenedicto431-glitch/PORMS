<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOST-3 · Staff Edit Page</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2d4f;--navy-dark:#0f1e36;--navy-mid:#243a62;
  --gold:#f5a623;--gold-light:#ffc158;--teal:#1b7a6e;
  --blue-light:#e8f0fa;--blue-mid:#c8d8f0;
  --border:#ccd6e8;--input-bg:#fafbff;
  --gray-50:#f9fafb;--gray-200:#e5e7eb;--gray-300:#d1d5db;
  --gray-400:#9ca3af;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;
  --red:#dc2626;--green:#16a34a;--orange:#ea580c;
  --app:#2d5a1b;--mpp:#1a3f6b;--emp:#1a5c4a;--fs:#1b7a6e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:#dde4ef;color:var(--gray-800);min-height:100vh;font-size:14px;line-height:1.5;}

.topbar{background:var(--navy-dark);color:white;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:46px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:13px;font-weight:600;letter-spacing:.03em;opacity:.9;}
.staff-badge{background:var(--orange);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}
.topbar-actions{display:flex;gap:8px;}
.tbtn{border:none;padding:6px 14px;font-weight:700;font-size:12.5px;cursor:pointer;border-radius:4px;transition:all .15s;font-family:inherit;}
.tbtn-print{background:rgba(255,255,255,.15);color:white;}
.tbtn-print:hover{background:rgba(255,255,255,.25);}
.tbtn-save{background:var(--gold);color:var(--navy-dark);}
.tbtn-save:hover{background:var(--gold-light);}
.tbtn-approve{background:var(--green);color:white;}
.tbtn-approve:hover{background:#15803d;}

.paper-wrap{max-width:940px;margin:28px auto;padding:0 12px 60px;}
.paper{background:white;box-shadow:0 2px 20px rgba(0,0,0,.12);border-radius:2px;overflow:hidden;}

/* BANNER */
.banner{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-mid) 100%);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.banner-left h1{color:white;font-size:16px;font-weight:700;}
.banner-left p{color:#8fa5c8;font-size:12.5px;margin-top:3px;}
.status-row{display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.status-chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.s-pending{background:#fef3c7;color:#92400e;}
.s-reviewed{background:#d1fae5;color:#065f46;}
.s-approved{background:#dbeafe;color:#1e40af;}
.s-declined{background:#fee2e2;color:#991b1b;}
.ref-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:8px 16px;text-align:right;}
.ref-chip-lbl{color:#8fa5c8;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.ref-chip-val{color:white;font-size:15px;font-weight:700;font-family:monospace;letter-spacing:.08em;margin-top:2px;}

/* PROG TAGS */
.prog-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.prog-tag{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.05em;}
.tag-app{background:var(--app);color:white;}
.tag-mpp{background:var(--mpp);color:white;}
.tag-emp{background:var(--emp);color:white;}
.tag-fs{background:var(--fs);color:white;}

/* STAFF NOTES */
.staff-panel{background:#fff8f0;border:1.5px solid #fec89a;border-radius:6px;padding:16px;margin:20px 28px 0;}
.staff-panel-title{font-size:12px;font-weight:700;color:var(--orange);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.status-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.sbtn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid transparent;cursor:pointer;transition:all .15s;font-family:inherit;}
.sbtn-pending{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.sbtn-pending.active,.sbtn-pending:hover{background:#fcd34d;}
.sbtn-reviewed{background:#d1fae5;color:#065f46;border-color:#6ee7b7;}
.sbtn-reviewed.active,.sbtn-reviewed:hover{background:#6ee7b7;}
.sbtn-approved{background:#dbeafe;color:#1e40af;border-color:#93c5fd;}
.sbtn-approved.active,.sbtn-approved:hover{background:#93c5fd;}
.sbtn-declined{background:#fee2e2;color:#991b1b;border-color:#fca5a5;}
.sbtn-declined.active,.sbtn-declined:hover{background:#fca5a5;}

/* FORM BODY */
.fbody{padding:0 28px 28px;}

/* SECTIONS */
.section{margin-top:24px;}
.sec-head{color:white;padding:8px 16px;font-weight:700;font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px;border-radius:3px 3px 0 0;}
.sec-head.shared{background:var(--navy);}
.sec-head.app{background:var(--app);}
.sec-head.mpp{background:var(--mpp);}
.sec-head.emp{background:var(--emp);}
.sec-head.fs{background:var(--fs);}
.sec-head.staff-only{background:var(--orange);}
.sec-num{background:rgba(255,255,255,.2);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.prog-badge-sm{background:rgba(255,255,255,.18);color:#d0e4ff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;margin-left:auto;letter-spacing:.03em;}
.sec-body{border:1px solid var(--border);border-top:none;padding:18px;border-radius:0 0 3px 3px;}

.stitle{font-weight:700;color:var(--navy);font-size:12px;margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--blue-mid);text-transform:uppercase;letter-spacing:.04em;}
.stitle:first-child{margin-top:0;}

/* FIELDS */
.fg{display:grid;gap:12px;margin-bottom:10px;}
.fg.c1{grid-template-columns:1fr;}
.fg.c2{grid-template-columns:1fr 1fr;}
.fg.c3{grid-template-columns:1fr 1fr 1fr;}
.fg.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fg.c21{grid-template-columns:2fr 1fr;}
.f{display:flex;flex-direction:column;gap:3px;}
.f label{font-size:11.5px;font-weight:600;color:var(--gray-700);}
.f input[type=text],.f input[type=email],.f input[type=tel],
.f input[type=number],.f input[type=date],.f select,.f textarea{
  border:1px solid var(--border);border-radius:3px;padding:6px 9px;
  font-size:13px;color:var(--gray-800);background:var(--input-bg);
  font-family:inherit;width:100%;transition:border-color .15s;
}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--navy-mid);box-shadow:0 0 0 2px rgba(36,58,98,.12);background:white;}
.f textarea{resize:vertical;min-height:60px;}

/* READ-ONLY display */
.ro-val{border:1px solid var(--gray-200);border-radius:3px;padding:6px 9px;font-size:13px;color:var(--gray-800);background:var(--gray-50);min-height:34px;}
.ro-label{font-size:11.5px;font-weight:600;color:var(--gray-400);margin-bottom:3px;}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:8px 0;}
.tbl th{background:var(--navy);color:white;padding:7px 10px;text-align:left;font-size:11px;font-weight:700;}
.tbl td{padding:5px 8px;border:1px solid var(--border);vertical-align:middle;}
.tbl td input,.tbl td select,.tbl td textarea{width:100%;border:none;background:transparent;font-size:12.5px;padding:2px 4px;font-family:inherit;color:var(--gray-800);}
.tbl tr:nth-child(even) td{background:var(--gray-50);}

/* FS TABLES */
.fs-lvl{background:var(--teal);color:white;padding:5px 12px;font-size:11.5px;font-weight:700;letter-spacing:.05em;border-radius:3px;margin:12px 0 6px;}
.ftbl{width:100%;border-collapse:collapse;font-size:12px;}
.ftbl th{background:var(--teal);color:white;padding:6px 10px;text-align:left;font-size:11px;font-weight:700;}
.ftbl td{border:1px solid var(--border);padding:5px 8px;vertical-align:middle;}
.ftbl tr:nth-child(even) td{background:var(--gray-50);}
.ftbl td input,.ftbl td select{width:100%;border:none;background:transparent;font-size:12px;font-family:inherit;padding:2px 4px;}

.cg{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:4px;}
.ci{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--gray-700);}
.ci input{cursor:pointer;width:14px;height:14px;}

/* CONCERN READ-ONLY */
.concern-display{background:var(--gray-50);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-size:12.5px;color:var(--gray-700);margin:6px 0;}

/* QUAL BOX */
.qual-box{background:#fffbe6;border:1px solid #f5d070;border-radius:4px;padding:12px 16px;margin:10px 0;font-size:12.5px;}

/* ACTIONS */
.form-actions{display:flex;gap:12px;justify-content:flex-end;padding:18px 28px 26px;border-top:1px solid var(--gray-200);background:var(--gray-50);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 22px;border-radius:4px;font-weight:700;font-size:13px;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-outline{background:white;color:var(--navy);border:1.5px solid var(--navy);}
.btn-outline:hover{background:var(--blue-light);}
.btn-orange{background:var(--orange);color:white;}
.btn-orange:hover{background:#c2410c;}
.btn-green{background:var(--green);color:white;}
.btn-green:hover{background:#15803d;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy-dark);color:white;padding:12px 20px;border-radius:6px;font-size:13px;font-weight:600;z-index:500;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.show{display:block;animation:slideup .3s ease;}
@keyframes slideup{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.div{height:1px;background:var(--gray-200);margin:14px 0;}
.hint{font-size:11px;color:var(--gray-400);font-style:italic;margin-top:2px;}
.group-lbl{font-weight:700;color:var(--navy);font-size:12px;margin:12px 0 5px;padding:4px 10px;background:var(--blue-light);border-left:3px solid var(--navy);border-radius:0 3px 3px 0;}

@media(max-width:640px){
  .fg.c2,.fg.c3,.fg.c4,.fg.c21{grid-template-columns:1fr;}
  .paper-wrap{padding:0 6px 40px;}
  .fbody{padding:14px 16px;}
}
@media print{
  .topbar,.form-actions,.staff-panel{display:none!important;}
  body{background:white;}
  .paper-wrap{margin:0;padding:0;max-width:100%;}
  .paper{box-shadow:none;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">DOST-3 · Staff Edit Page</span>
    <span class="staff-badge">Authorized Personnel Only</span>
  </div>
  <div class="topbar-actions">
    <button class="tbtn tbtn-print" onclick="window.print()">Print</button>
    <button class="tbtn tbtn-save" onclick="saveChanges()">Save Changes</button>
    <button class="tbtn tbtn-approve" onclick="markApproved()">Mark as Approved</button>
  </div>
</div>

<div class="paper-wrap"><div class="paper">

<!-- BANNER -->
<div class="banner">
  <div class="banner-left">
    <h1>Submission Review &amp; Edit</h1>
    <p>DOST-3 · 2025 Assessment and Qualifying Form — Staff View</p>
    <div class="status-row">
      <span class="status-chip s-pending" id="status-chip">● PENDING REVIEW</span>
      <span style="color:#8fa5c8;font-size:12px" id="date-display"></span>
    </div>
    <div class="prog-tags" id="prog-tags"></div>
  </div>
  <div class="ref-chip">
    <div class="ref-chip-lbl">Reference No.</div>
    <div class="ref-chip-val" id="ref-display">—</div>
  </div>
</div>

<!-- STAFF NOTES -->
<div class="staff-panel">
  <div class="staff-panel-title">⚙ Staff Assessment Notes</div>
  <div class="fg c1">
    <div class="f">
      <label>Assessment Status</label>
      <div class="status-btns">
        <button class="sbtn sbtn-pending active" id="sbtn-pending" onclick="setStatus('pending')">Pending</button>
        <button class="sbtn sbtn-reviewed" id="sbtn-reviewed" onclick="setStatus('reviewed')">Reviewed</button>
        <button class="sbtn sbtn-approved" id="sbtn-approved" onclick="setStatus('approved')">Approved</button>
        <button class="sbtn sbtn-declined" id="sbtn-declined" onclick="setStatus('declined')">Declined</button>
      </div>
    </div>
  </div>
  <div class="fg c2" style="margin-top:10px">
    <div class="f"><label>Assigned PSTO Staff</label><input type="text" id="staff-assigned" placeholder="Name of assigned staff"></div>
    <div class="f"><label>Date of Initial Assessment</label><input type="date" id="staff-date"></div>
  </div>
  <div class="fg c1">
    <div class="f"><label>Internal Remarks / Observations</label><textarea id="staff-remarks" rows="3" placeholder="Internal notes for DOST staff only — not visible to applicant..."></textarea></div>
  </div>
  <div class="fg c1">
    <div class="f"><label>Reason for Decline (if applicable)</label><input type="text" id="staff-decline" placeholder="Reason for declining this application"></div>
  </div>
  <div class="fg c2">
    <div class="f"><label>Assisted by (DOST-III PSTO Staff)</label><input type="text" id="sig-assisted" placeholder="Name and signature"></div>
    <div class="f"><label>Noted by (Provincial S&amp;T Director)</label><input type="text" id="sig-noted" placeholder="Name and signature"></div>
  </div>
</div>

<div class="fbody" id="form-sections">
  <!-- Sections injected by JS based on which programs were selected -->
</div>

<div class="form-actions">
  <button class="btn btn-outline" onclick="window.print()">Print</button>
  <button class="btn btn-orange" onclick="saveChanges()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save Changes
  </button>
  <button class="btn btn-green" onclick="markApproved()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    Mark as Approved
  </button>
</div>

</div></div>

<div class="toast" id="toast"></div>

<script>
// ── READ URL PARAMS ───────────────────────────────────────────
const p = new URLSearchParams(window.location.search);
function gp(key){ return decodeURIComponent(p.get(key)||''); }

const ref = gp('ref') || '—';
const programs = gp('programs'); // e.g. "APP,MPP" or "EMP" or "APP,EMP,FS"
const hasApp = programs.includes('APP');
const hasMpp = programs.includes('MPP');
const hasEmp = programs.includes('EMP');
const hasFs  = programs.includes('FS');

// Display ref and date
document.getElementById('ref-display').textContent = ref;
const dateStr = gp('date');
if (dateStr) {
  const d = new Date(dateStr);
  document.getElementById('date-display').textContent = 'Submitted: ' + d.toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

// Program tags
const tagColors = {APP:'tag-app',MPP:'tag-mpp',EMP:'tag-emp',FS:'tag-fs'};
programs.split(',').forEach(function(prog){
  prog = prog.trim();
  if (!prog) return;
  const span = document.createElement('span');
  span.className = 'prog-tag ' + (tagColors[prog]||'');
  span.textContent = prog;
  document.getElementById('prog-tags').appendChild(span);
});

// ── STATUS ────────────────────────────────────────────────────
let currentStatus = 'pending';
function setStatus(s) {
  currentStatus = s;
  ['pending','reviewed','approved','declined'].forEach(function(x){
    document.getElementById('sbtn-'+x).classList.toggle('active', x===s);
  });
  const chip = document.getElementById('status-chip');
  const labels = {pending:'● PENDING REVIEW',reviewed:'● REVIEWED',approved:'● APPROVED',declined:'● DECLINED'};
  const cls = {pending:'s-pending',reviewed:'s-reviewed',approved:'s-approved',declined:'s-declined'};
  chip.textContent = labels[s];
  chip.className = 'status-chip '+cls[s];
}

// ── HELPERS ───────────────────────────────────────────────────
function field(label, value, editable, inputId, type) {
  type = type || 'text';
  if (editable) {
    return '<div class="f"><label>'+label+'</label><input type="'+type+'" id="'+inputId+'" value="'+esc(value)+'" placeholder="'+label+'"></div>';
  }
  return '<div class="f"><div class="ro-label">'+label+'</div><div class="ro-val">'+esc(value||'—')+'</div></div>';
}
function textarea(label, value, inputId) {
  return '<div class="f"><label>'+label+'</label><textarea id="'+inputId+'" rows="2">'+esc(value)+'</textarea></div>';
}
function esc(v){ return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function roField(label, value) {
  return '<div class="f"><div class="ro-label">'+label+'</div><div class="ro-val">'+(value||'—')+'</div></div>';
}
function secHead(cls, num, title, badge) {
  return '<div class="sec-head '+cls+'"><span class="sec-num">'+num+'</span> '+title+' <span class="prog-badge-sm">'+badge+'</span></div>';
}
function fg(cols, html) { return '<div class="fg '+cols+'">'+html+'</div>'; }

// Rebuild consult table from stored rows string: "a||b||c;;d||e||f"
function buildConsultTable(rowsStr) {
  if (!rowsStr) return '';
  var rows = rowsStr.split(';;');
  var html = '<table class="tbl"><thead><tr><th style="width:33%">Agency / Company</th><th style="width:20%">Date of Assistance</th><th>Type of Assistance / Consultancy</th></tr></thead><tbody>';
  rows.forEach(function(row){
    var cells = row.split('||');
    html += '<tr>';
    [0,1,2].forEach(function(i){ html += '<td><input type="text" value="'+esc(cells[i]||'')+'"></td>'; });
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

// Rebuild equipment table
function buildEquipTable(rowsStr) {
  if (!rowsStr) return '';
  var rows = rowsStr.split(';;');
  var html = '<table class="tbl"><thead><tr>'
    + '<th style="width:30%">Equipment &amp; Description</th><th style="width:10%">Qty</th>'
    + '<th style="width:15%">Rated HP</th><th style="width:15%">Rated kW</th><th>Hours/Day</th>'
    + '</tr></thead><tbody>';
  rows.forEach(function(row){
    var cells = row.split('||');
    html += '<tr>';
    [0,1,2,3,4].forEach(function(i){ html += '<td><input type="text" value="'+esc(cells[i]||'')+'"></td>'; });
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

// Rebuild farm data table
function buildFarmTable(rowsStr) {
  if (!rowsStr) return '';
  var rows = rowsStr.split(';;');
  var headers = ['Commodity','Variety/Breed','Area','Avg Yield/Cropping','Avg Income/Cropping','No. of Croppings/Yr','Other Info'];
  var html = '<table class="tbl"><thead><tr>'+headers.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead><tbody>';
  rows.forEach(function(row){
    var cells = row.split('||');
    html += '<tr>';
    headers.forEach(function(h,i){ html += '<td><input type="text" value="'+esc(cells[i]||'')+'"></td>'; });
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

// Rebuild pre-assessment table
function buildPreAssessTable(rowsStr) {
  if (!rowsStr) return '';
  var rows = rowsStr.split(';;');
  var headers = ['Possible Areas of Interventions','Technical Needs / Problems','Initial Recommendations / Remarks'];
  var html = '<table class="tbl"><thead><tr>'+headers.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead><tbody>';
  rows.forEach(function(row){
    var cells = row.split('||');
    html += '<tr>';
    headers.forEach(function(h,i){ html += '<td><input type="text" value="'+esc(cells[i]||'')+'"></td>'; });
    html += '</tr>';
  });
  html += '<tr><td><input type="text" placeholder="Add row..."></td><td><input type="text"></td><td><input type="text"></td></tr>';
  html += '</tbody></table>';
  return html;
}

// ── BUILD SECTIONS ────────────────────────────────────────────
let html = '';
let secNum = 1;
function roman(n){ return ['I','II','III','IV','V','VI','VII','VIII','IX','X'][n-1]||n; }

// Determine owner source
const ownerName     = hasApp ? gp('ownerName')     : (hasMpp ? gp('firmOwnerName')     : gp('empOwnerName'));
const ownerSex      = hasApp ? gp('ownerSex')      : (hasMpp ? gp('firmOwnerSex')      : gp('empOwnerSex'));
const ownerAge      = hasApp ? gp('ownerAge')      : (hasMpp ? gp('firmOwnerAge')      : gp('empOwnerAge'));
const ownerPosition = hasApp ? gp('ownerPosition') : (hasMpp ? gp('firmOwnerPosition') : gp('empOwnerPosition'));
const contactPerson = hasApp ? gp('contactPerson') : (hasMpp ? gp('firmContactPerson') : gp('empContactPerson'));
const contactSex    = hasApp ? gp('contactSex')    : (hasMpp ? gp('firmContactSex')    : gp('empContactSex'));
const ownerEmail    = hasApp ? gp('ownerEmail')    : (hasMpp ? gp('firmEmail')         : gp('empEmail'));
const contactNum    = hasMpp ? gp('firmContactNum'): gp('empContactNum');

// ── APP ──────────────────────────────────────────────────────
if (hasApp) {
  html += '<div class="section">';
  html += secHead('app', roman(secNum++), 'Agricultural Productivity Program (APP) — Farm Profile', 'APP');
  html += '<div class="sec-body">';
  html += '<div class="stitle">Farm Details</div>';
  html += fg('c2', field('Name of Farm','',true,'e-app-farm-name') + field('Province','',true,'e-app-province'));

// ── STATUS & SAVE ─────────────────────────────────────────────
let currentStatus = 'pending';
function setStatus(s) {
  currentStatus = s;
  ['pending','reviewed','approved','declined'].forEach(function(x){
    document.getElementById('sbtn-'+x).classList.toggle('active', x===s);
  });
  const chip = document.getElementById('status-chip');
  const labels = {pending:'● PENDING REVIEW',reviewed:'● REVIEWED',approved:'● APPROVED',declined:'● DECLINED'};
  const cls = {pending:'s-pending',reviewed:'s-reviewed',approved:'s-approved',declined:'s-declined'};
  chip.textContent = labels[s];
  chip.className = 'status-chip '+cls[s];
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function saveChanges() {
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID_HERE/exec';
  const data = {
    action:'update', ref:ref, status:currentStatus,
    staffAssigned: document.getElementById('staff-assigned').value,
    staffRemarks:  document.getElementById('staff-remarks').value,
    staffDate:     document.getElementById('staff-date').value,
    staffDecline:  document.getElementById('staff-decline').value,
    sigAssisted:   document.getElementById('sig-assisted').value,
    sigNoted:      document.getElementById('sig-noted').value,
  };
  fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).catch(function(){});
  showToast('✓ Changes saved successfully');
}

function markApproved() {
  setStatus('approved');
  document.getElementById('staff-date').value = new Date().toISOString().split('T')[0];
  saveChanges();
  showToast('✓ Submission marked as Approved');
}
